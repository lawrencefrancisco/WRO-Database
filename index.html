<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WRO Philippines – Database System Login</title>
  <meta name="description" content="WRO Philippines Integrated Database System – Official platform for managing participants, competitions, and records.">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            felta: { yellow:'#FFC72C', navy:'#142057' },
            gold:  { 300:'#f6d860', 400:'#e8c027', 500:'#D4A017', 600:'#b8860b', 700:'#8B6914' },
            wro:   { red:'#E8384F', orange:'#F07830', yellow:'#FFC72C', green:'#2EC97C', teal:'#1E9EBF', blue:'#1D6FA4', purple:'#6C4FBF' },
          }
        }
      }
    }
  </script>

  <!-- Early theme + logo swap to prevent flash -->
  <script>
    if (localStorage.getItem('wro_ph_theme') === 'light') {
      document.documentElement.classList.add('light-mode');
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.js-theme-logo').forEach(img => {
          img.src = 'assets/image/felta-logo-new-lightmode.png';
        });
      });
    }
  </script>

  <link rel="stylesheet" href="css/custom.css">
  <script src="js/core/db.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/seed.js"></script>

  <style>
    /* ── Login page extras ── */
    .login-split-line {
      display: flex; align-items: center; gap: 12px; margin: 4px 0;
    }
    .login-split-line::before, .login-split-line::after {
      content: ''; flex: 1; height: 1px; background: rgba(245,200,0,0.14);
    }
    .role-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
      border: 1px solid; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      text-align: left; background: transparent;
      font-family: 'Inter', sans-serif;
    }
    .role-btn:hover { transform: translateY(-1px); }
    .role-btn svg { flex-shrink: 0; }
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; display: flex; align-items: center;
    }
  </style>
</head>

<body class="login-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Dot grid -->
  <div class="fixed inset-0 pointer-events-none"
       style="background-image:radial-gradient(rgba(245,200,0,0.9) 1px,transparent 1px);background-size:34px 34px;opacity:0.022;">
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Login Card -->
  <div class="login-card w-full max-w-md relative z-10">

    <div class="glass rounded-2xl p-8 mb-4 gold-glow">

      <!-- Logo & Branding -->
      <div class="text-center mb-7">
        <div class="flex justify-center mb-5">
          <img src="assets/image/felta-logo-new.png" alt="FELTA WRO Philippines"
               class="h-24 object-contain js-theme-logo"
               style="filter: drop-shadow(0 2px 16px rgba(245,200,0,0.35));">
        </div>

        <!-- Rainbow bar -->
        <div class="wro-rainbow-bar rounded-full mb-5"></div>

        <!-- Title block -->
        <div class="space-y-1">
          <h1 class="text-xl font-black tracking-tight" style="color:#EEF0F8;">
            Integrated Database System
          </h1>
          <p class="text-xs font-medium tracking-widest" style="color:#6B7494;">
            OFFICIAL COMPETITION MANAGEMENT PLATFORM
          </p>
        </div>

        <!-- Live status -->
        <div class="flex items-center justify-center gap-2 mt-4 px-4 py-2 rounded-xl inline-flex glass-light" style="display:inline-flex;margin-top:16px;">
          <div class="pulse-dot"></div>
          <span class="text-xs font-semibold" style="color:#FFC72C;">System Online</span>
        </div>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4" autocomplete="on" novalidate>

        <!-- Username -->
        <div>
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon" style="color:#6B7494;">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="username" type="text" class="form-input" style="padding-left:38px;"
              placeholder="Enter your username" autocomplete="username" required>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon" style="color:#6B7494;">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="password" type="password" class="form-input" style="padding-left:38px;padding-right:42px;"
              placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" id="pwd-toggle" onclick="togglePwd()"
              class="absolute right-3 top-1/2 -translate-y-1/2 transition-colors"
              style="color:#6B7494;background:none;border:none;cursor:pointer;display:flex;align-items:center;">
              <span id="pwd-eye" style="display:flex;align-items:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </button>
          </div>
        </div>

        <!-- Quick Login Roles -->
        <div>
          <div class="login-split-line">
            <span class="text-xs font-semibold" style="color:#6B7494;letter-spacing:0.6px;">QUICK LOGIN</span>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <!-- Super Admin -->
            <button type="button" onclick="quickLogin('admin','admin123')" class="role-btn"
              style="background:rgba(245,200,0,0.09);border-color:rgba(245,200,0,0.28);color:#e8c027;">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              Super Admin
            </button>
            <!-- Event Admin -->
            <button type="button" onclick="quickLogin('eventadmin','event123')" class="role-btn"
              style="background:rgba(29,111,164,0.10);border-color:rgba(29,111,164,0.28);color:#4aadde;">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
              Event Admin
            </button>
            <!-- Judge -->
            <button type="button" onclick="quickLogin('judge1','judge123')" class="role-btn"
              style="background:rgba(240,120,48,0.10);border-color:rgba(240,120,48,0.28);color:#F07830;">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Judge
            </button>
            <!-- Coach -->
            <button type="button" onclick="quickLogin('coach1','coach123')" class="role-btn"
              style="background:rgba(46,201,124,0.09);border-color:rgba(46,201,124,0.26);color:#2EC97C;">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
              Coach
            </button>
            <!-- Volunteer full width -->
            <button type="button" onclick="quickLogin('volunteer1','volunteer123')" class="role-btn col-span-2 justify-center"
              style="background:rgba(107,116,148,0.09);border-color:rgba(107,116,148,0.24);color:#9299b8;">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Volunteer
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="login-btn"
          class="btn-primary w-full py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 mt-2"
          style="font-size:14px;">
          <span id="login-icon" style="display:flex;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </span>
          <span id="login-text">Sign In</span>
        </button>

        <!-- Error message -->
        <div id="login-error" class="hidden text-center text-sm p-3 rounded-xl"
          style="color:#E8384F;background:rgba(232,56,79,0.10);border:1px solid rgba(232,56,79,0.24);">
        </div>
      </form>
    </div>

    <!-- Credentials hint -->
    <div class="glass rounded-xl p-4 text-center" style="border:1px solid rgba(245,200,0,0.13);">
      <p class="text-xs" style="color:#6B7494;">
        Default: <span style="color:#C9A400;font-family:monospace;font-weight:600;">admin</span>
        <span style="color:#6B7494;margin:0 6px;">/</span>
        <span style="color:#C9A400;font-family:monospace;font-weight:600;">admin123</span>
        <span style="color:#6B7494;margin:0 8px;">·</span>
        Use Quick Login above to switch roles
      </p>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs mt-4" style="color:#2d3a52;">
      FELTA Multimedia · WRO Philippines © 2025 · Database System v2.0
    </p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (AUTH.isLoggedIn()) { window.location.href = 'dashboard.html'; }
    });

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('login-error');

      btn.disabled = true;
      document.getElementById('login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg>`;
      document.getElementById('login-text').textContent = 'Signing in...';
      errEl.classList.add('hidden');

      const result = await AUTH.login(username, password);
      if (result.success) {
        document.getElementById('login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>`;
        document.getElementById('login-text').textContent = 'Welcome!';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
      } else {
        errEl.textContent = result.error;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        document.getElementById('login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4'/><polyline points='10 17 15 12 10 7'/><line x1='15' y1='12' x2='3' y2='12'/></svg>`;
        document.getElementById('login-text').textContent = 'Sign In';
      }
    }

    function quickLogin(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      document.getElementById('login-form').dispatchEvent(new Event('submit'));
    }

    function togglePwd() {
      const pwd = document.getElementById('password');
      const eye = document.getElementById('pwd-eye');
      const icon_open  = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg>`;
      const icon_closed = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24'/><line x1='1' y1='1' x2='23' y2='23'/></svg>`;
      if (pwd.type === 'password') { pwd.type = 'text'; eye.innerHTML = icon_closed; }
      else { pwd.type = 'password'; eye.innerHTML = icon_open; }
    }
  </script>
</body>
</html>
