<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WRO Philippines – Sign Up</title>
  <meta name="description" content="WRO Philippines Standard User Portal – Create an account.">

  <!-- Tailwind CSS (static build) -->
  <link rel="stylesheet" href="assets/css/output.css">

  <!-- Early theme init -->
  <script>
    (function() {
      const saved = localStorage.getItem('wro_ph_theme');
      const isLight = saved !== 'dark';
      if (isLight) document.documentElement.classList.add('light-mode');
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.js-theme-logo').forEach(img => {
          img.src = isLight ? 'assets/image/FELTA_LOGO_LIGHT.png' : 'assets/image/FELTA_LOGO_DARK.png';
        });
      });
    })();
  </script>

  <link rel="stylesheet" href="css/custom.css">

  <style>
    /* ── Input icon wrapper ── */
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; display: flex; align-items: center;
    }

    /* ── Login page body ── */
    body.login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
      position: relative;
    }

    /* ── Low opacity background image ── */
    body.login-page::before {
      content: '';
      position: fixed; inset: 0;
      background: url('assets/image/login-background.jpg') center/cover no-repeat;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }
    html.light-mode body.login-page::before { opacity: 0.04; }

    /* ── Dark mode background (blue-accented) ── */
    body.login-page {
      background:
        radial-gradient(ellipse at 8% 45%, rgba(246,201,69,0.18) 0%, transparent 52%),
        radial-gradient(ellipse at 92% 12%, rgba(20,32,87,0.95) 0%, transparent 55%),
        radial-gradient(ellipse at 55% 92%, rgba(246,201,69,0.08) 0%, transparent 50%),
        #070c20;
    }

    /* ── Light mode background ── */
    html.light-mode body.login-page {
      background:
        radial-gradient(ellipse at 8% 45%, rgba(246,201,69,0.10) 0%, transparent 52%),
        radial-gradient(ellipse at 92% 12%, rgba(246,201,69,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 55% 92%, rgba(246,201,69,0.06) 0%, transparent 50%),
        linear-gradient(155deg, #EAF2FC 0%, #F5F9FF 45%, #E4EEF8 100%);
    }

    /* ── Animated background orbs ── */
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 10s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .login-orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(246,201,69,0.20), transparent 70%);
      top: -160px; left: -160px;
      animation-delay: 0s;
    }
    .login-orb-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(246,201,69,0.10), transparent 70%);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    .login-orb-3 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(30,158,191,0.10), transparent 70%);
      top: 40%; left: 65%;
      animation-delay: -7s;
    }
    html.light-mode .login-orb-1 { background: radial-gradient(circle, rgba(246,201,69,0.14), transparent 70%); }
    html.light-mode .login-orb-2 { background: radial-gradient(circle, rgba(246,201,69,0.09), transparent 70%); }
    html.light-mode .login-orb-3 { background: radial-gradient(circle, rgba(30,158,191,0.09), transparent 70%); }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      33% { transform: translateY(-24px) scale(1.04); }
      66% { transform: translateY(12px) scale(0.97); }
    }

    /* ── Dot grid overlay ── */
    .dot-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(rgba(246,201,69,0.65) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.020;
    }
    html.light-mode .dot-grid { opacity: 0.012; }

    /* ── Login card container ── */
    .login-card-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 10;
      animation: cardEntrance 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(44px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── The card itself ── */
    .login-card {
      background: rgba(13, 20, 56, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(246,201,69,0.28);
      border-radius: 20px;
      padding: 2.2rem 2rem;
      box-shadow:
        0 0 0 1px rgba(246,201,69,0.08),
        0 8px 48px rgba(0,0,0,0.60),
        0 0 80px rgba(246,201,69,0.10);
    }
    html.light-mode .login-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(246,201,69,0.16);
      box-shadow:
        0 0 0 1px rgba(246,201,69,0.06),
        0 10px 48px rgba(10,20,60,0.11),
        0 2px 12px rgba(246,201,69,0.06);
    }

    /* ── Form inputs ── */
    .login-input {
      background: rgba(5, 9, 28, 0.85);
      border: 1px solid rgba(246,201,69,0.20);
      color: #EEF0F8;
      border-radius: 12px;
      padding: 11px 14px 11px 40px;
      width: 100%;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-input:focus {
      outline: none;
      border-color: #F6C945;
      box-shadow: 0 0 0 3px rgba(246,201,69,0.18);
    }
    .login-input::placeholder { color: rgba(107,116,148,0.7); }
    html.light-mode .login-input {
      background: #ffffff;
      border: 1px solid rgba(246,201,69,0.20);
      color: #0D1B3E;
      box-shadow: inset 0 1px 3px rgba(10,20,60,0.04);
    }
    html.light-mode .login-input:focus {
      border-color: #1d6fa4;
      box-shadow: 0 0 0 3px rgba(246,201,69,0.14);
    }
    html.light-mode .login-input::placeholder { color: #9EB3CE; }

    /* ── Label ── */
    .login-label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: rgba(107,116,148,0.9);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    html.light-mode .login-label { color: #5A6E96; }

    /* ── Input icon ── */
    .input-icon { color: rgba(107,116,148,0.7); }
    html.light-mode .input-icon { color: #9EB3CE; }

    /* ── Submit button (blue) ── */
    .portal-submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, #F6C945 0%, #C9A012 100%);
      color: #07100e;
      box-shadow: 0 4px 20px rgba(246,201,69,0.40), 0 1px 4px rgba(0,0,0,0.25);
      transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 1.4rem;
    }
    .portal-submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(246,201,69,0.60), 0 2px 8px rgba(0,0,0,0.25);
      background: linear-gradient(135deg, #FAD966 0%, #F6C945 100%);
    }
    .portal-submit-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .portal-submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Error box ── */
    .login-error {
      margin-top: 0.9rem;
      color: #E8384F;
      background: rgba(232,56,79,0.10);
      border: 1px solid rgba(232,56,79,0.24);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    html.light-mode .login-error {
      background: rgba(232,56,79,0.07);
      border-color: rgba(232,56,79,0.20);
    }

    /* ── Footer text ── */
    .login-footer { margin-top: 1.2rem; text-align: center; }
    .login-footer p { font-size: 12px; color: rgba(107,116,148,0.8); margin-bottom: 4px; }
    html.light-mode .login-footer p { color: #7A90B4; }
    .login-footer a { color: #F6C945; font-weight: 700; text-decoration: none; transition: opacity 0.18s; }
    .login-footer a:hover { opacity: 0.75; }
    html.light-mode .login-footer a { color: #8B6914; }

    /* ── Page title text ── */
    .login-title { color: #EEF0F8; font-size: 1.25rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; text-align: center; }
    html.light-mode .login-title { color: #0D1B3E; }
    .login-subtitle { color: rgba(107,116,148,0.85); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; text-align: center; margin-bottom: 1.5rem; }
    html.light-mode .login-subtitle { color: #7A90B4; }
  </style>
</head>

<body class="login-page">
  <!-- Background layers -->
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>
  <div class="dot-grid"></div>

  <!-- Login card -->
  <div class="login-card-wrap">
    <div class="login-card">

      <!-- Header: Logo + branding -->
      <div style="text-align:center; margin-bottom:1.6rem;">
        <div style="display:flex; justify-content:center; margin-bottom:1.1rem;">
          <img src="assets/image/FELTA_LOGO_DARK.png" alt="FELTA WRO Philippines"
               class="js-theme-logo"
               style="height:88px; width:auto; object-fit:contain; max-width:100%;
                      filter:drop-shadow(0 2px 14px rgba(246,201,69,0.30));">
        </div>
      </div>
      
      <h1 class="login-title">Create an Account</h1>
      <p class="login-subtitle">Join WRO Philippines to manage your teams.</p>
      
      <!-- Login Form -->
      <form id="signup-form">
        <!-- Full Name -->
        <div style="margin-bottom:1rem;">
          <label class="login-label" for="name">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="name" type="text" class="login-input"
              placeholder="e.g. John Doe" required>
          </div>
        </div>

        <!-- Email Address -->
        <div style="margin-bottom:1rem;">
          <label class="login-label" for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input id="email" type="email" class="login-input"
              placeholder="john@example.com" required>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="login-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="password" type="password" class="login-input"
              placeholder="Create a password" required minlength="6">
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" id="submit-btn" class="portal-submit-btn">
          Sign Up
        </button>

        <!-- Error message -->
        <div id="error-msg" class="login-error"></div>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>
        Already have an account? <a href="portal-login">Sign In</a>
      </p>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:3000/api' : window.location.origin + '/api';
    
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errBox = document.getElementById('error-msg');
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      btn.textContent = 'Registering...';
      btn.disabled = true;
      errBox.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          // Redirect to OTP Verification page with email in URL
          window.location.href = `verify?email=${encodeURIComponent(email)}`;
        } else {
          errBox.textContent = data.error || 'Registration failed.';
          errBox.style.display = 'block';
          btn.textContent = 'Sign Up';
          btn.disabled = false;
        }
      } catch (err) {
        errBox.textContent = 'Network error. Please try again.';
        errBox.style.display = 'block';
        btn.textContent = 'Sign Up';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
