<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WRO Philippines – Database System</title>
  <meta name="description" content="WRO Philippines Integrated Database System – Official platform for managing participants, competitions, and records.">

  <!-- Tailwind CSS v3 Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold:  { 300:'#f6d860', 400:'#e8c027', 500:'#D4A017', 600:'#b8860b', 700:'#8B6914' },
            navy:  { 600:'#1e2d4a', 700:'#162038', 800:'#101a2e', 900:'#0b1220', 950:'#060c18' },
            wro:   { red:'#e63946', orange:'#f4841a', yellow:'#f9c61b', green:'#2dc653', blue:'#1d6fa4', purple:'#8338ec', pink:'#e91e8c' },
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Custom CSS (animations, glassmorphism, data-table) -->
  <link rel="stylesheet" href="css/custom.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Core JS (order matters!) -->
  <script src="js/core/db.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/seed.js"></script>

  <!-- Module JS -->
  <script src="js/modules/schools.js"></script>
  <script src="js/modules/coaches.js"></script>
  <script src="js/modules/students.js"></script>
  <script src="js/modules/teams.js"></script>
  <script src="js/modules/competitions.js"></script>
  <script src="js/modules/judging.js"></script>
  <script src="js/modules/awards.js"></script>
  <script src="js/modules/payments_comms_delegation.js"></script>
  <script src="js/modules/users.js"></script>

  <!-- Views JS -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/reports.js"></script>

  <!-- App Controller (init last) -->
  <script src="js/app.js"></script>

  <style>
    body { background: #060c18; }
    #sidebar { width: 260px; min-height: 100vh; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen">

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside id="sidebar"
    class="glass fixed left-0 top-0 h-full z-40 flex flex-col overflow-hidden"
    style="width:260px;border-right:1px solid rgba(212,160,23,0.2);">
    <!-- Filled by App._renderSidebar() -->
  </aside>

  <!-- ── Main Content ─────────────────────────────────────── -->
  <div id="main-content" class="flex-1 flex flex-col" style="margin-left:260px;min-height:100vh;">

    <!-- Topbar -->
    <header id="topbar"
      class="glass sticky top-0 z-30 px-6 py-3 flex items-center gap-4"
      style="backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,0.2);">
      <!-- Filled by App._renderTopbar() -->
    </header>

    <!-- Page Content -->
    <main id="page-content"
      class="flex-1 p-6 overflow-y-auto"
      style="background: radial-gradient(ellipse at 20% 0%, rgba(212,160,23,0.05) 0%, transparent 50%),
                         radial-gradient(ellipse at 80% 100%, rgba(29,111,164,0.04) 0%, transparent 50%),
                         #060c18;">
      <!-- Router renders views here -->
      <div class="flex items-center justify-center h-full">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="px-6 py-3 text-xs text-slate-700 border-t border-slate-800/40 flex justify-between items-center">
      <span>WRO Philippines Integrated Database System v1.0</span>
      <span>© 2025 WRO Philippines · All rights reserved</span>
    </footer>
  </div>

  <!-- Mobile Overlay -->
  <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/50 z-30 md:hidden"
    onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.classList.add('hidden')">
  </div>
<!-- ── AI Chatbot Chathead + Modal ──────────────────────────── -->

<!-- Floating Chathead Button (visible when modal is closed) -->
<button id="chat-head-btn" class="chat-head-btn" onclick="ChatBot.open()" title="Chat with WRO Assistant" aria-label="Open AI Chat Assistant">
  <span class="chat-head-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </span>
  <span class="chat-head-ping"></span>
</button>

<!-- Chat Modal (hidden by default) -->
<div id="chat-modal" class="chat-modal" aria-hidden="true">
  <!-- Chat Header -->
  <div class="chat-modal-header">
    <div class="chat-modal-header-info">
      <div class="chat-avatar-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div>
        <div class="chat-modal-title">Felix</div>
        <div class="chat-modal-status"><span class="chat-status-dot"></span> Online</div>
      </div>
    </div>
    <button class="chat-close-btn" onclick="ChatBot.close()" title="Minimize" aria-label="Close chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Chat Messages -->
  <div id="chat-messages" class="chat-messages">
    <div class="chat-bubble chat-bubble-ai">
      <span>👋 Hi! I'm <strong>Felix</strong>, your WRO Philippines assistant. Ask me anything about competitions, teams, schools, or the database system!</span>
    </div>
  </div>

  <!-- Chat Input -->
  <div class="chat-input-area">
    <input
      type="text"
      id="chat-input"
      class="chat-input"
      placeholder="Ask me anything…"
      autocomplete="off"
      aria-label="Chat message input"
    >
    <button id="chat-send-btn" class="chat-send-btn" aria-label="Send message">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
</body>
</html>
