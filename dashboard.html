<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WRO Philippines – Database System</title>
  <meta name="description" content="WRO Philippines Integrated Database System – Official platform for managing participants, competitions, and records.">

  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            felta: { yellow:'#FFC72C', navy:'#142057' },
            gold:  { 300:'#f6d860', 400:'#e8c027', 500:'#D4A017', 600:'#b8860b', 700:'#8B6914' },
            navy:  { 600:'#1e2d4a', 700:'#162038', 800:'#101a2e', 900:'#0b1220', 950:'#060c18' },
            wro:   { red:'#E8384F', orange:'#F07830', yellow:'#FFC72C', green:'#2EC97C', teal:'#1E9EBF', blue:'#1D6FA4', purple:'#6C4FBF' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/custom.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Core JS -->
  <script src="js/core/db.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/seed.js"></script>

  <!-- Module JS -->
  <script src="js/modules/schools.js"></script>
  <script src="js/modules/coaches.js"></script>
  <script src="js/modules/students.js"></script>
  <script src="js/modules/teams.js"></script>
  <script src="js/modules/competitions.js"></script>
  <script src="js/modules/judging.js"></script>
  <script src="js/modules/awards.js"></script>
  <script src="js/modules/payments_comms_delegation.js"></script>
  <script src="js/modules/users.js"></script>

  <!-- Views JS -->
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/reports.js"></script>

  <!-- App Controller -->
  <script src="js/app.js"></script>

  <style>
    body { background: #070c20; }
    /* sidebar width is managed by responsive CSS in custom.css */
    #sidebar { min-height: 100vh; }

    /* ── Sidebar logo area separator ── */
    .sidebar-logo-area {
      padding: 18px 16px 14px;
      border-bottom: 1px solid rgba(245,200,0,0.18);
      position: relative;
    }
    .sidebar-logo-area::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 16px;
      right: 16px;
      height: 1px;
    }

    /* ── Topbar page title accent ── */
    #page-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #FFC72C;
      border-radius: 2px;
      margin-right: 10px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* ── User avatar letter gradient ── */
    .user-avatar-letter {
      background: linear-gradient(135deg, #FFC72C, #C9A400);
      color: #070c20;
      font-weight: 800;
    }

    /* ── Mobile hamburger line ── */
    .hamburger-line {
      display: block; width: 18px; height: 2px;
      background: currentColor; border-radius: 2px;
      transition: all 0.2s;
    }

    /* ── Nav group hover effect on icon ── */
    .nav-item:hover .nav-icon svg {
      filter: drop-shadow(0 0 4px rgba(245,200,0,0.4));
    }
    .nav-item.active .nav-icon svg {
      filter: drop-shadow(0 0 6px rgba(245,200,0,0.55));
    }

    /* ── Footer refinements ── */
    footer {
      backdrop-filter: blur(12px);
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 flex min-h-screen">

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside id="sidebar"
    role="complementary"
    aria-label="Main navigation sidebar"
    aria-hidden="true"
    class="glass fixed left-0 top-0 h-full z-40 flex flex-col overflow-hidden"
    style="border-right:1px solid rgba(245,200,0,0.18);">
    <!-- Filled by App._renderSidebar() -->
  </aside>

  <!-- ── Main Content ─────────────────────────────────────────── -->
  <div id="main-content" class="flex-1 flex flex-col min-w-0">

    <!-- Topbar -->
    <header id="topbar"
      class="glass sticky top-0 z-30 px-6 py-3 flex items-center gap-4"
      style="backdrop-filter:blur(24px);border-bottom:1px solid rgba(245,200,0,0.18);">
      <!-- Filled by App._renderTopbar() -->
    </header>

    <!-- Page Content -->
    <main id="page-content"
      class="flex-1 p-6 overflow-y-auto"
      style="background: radial-gradient(ellipse at 20% 0%, rgba(245,200,0,0.05) 0%, transparent 50%),
                         radial-gradient(ellipse at 80% 100%, rgba(29,111,164,0.04) 0%, transparent 50%),
                         #070c20;">
      <!-- Router renders views here -->
      <div class="flex items-center justify-center h-full">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="px-6 py-3 text-xs flex justify-between items-center"
      style="background:rgba(7,11,32,0.85);border-top:1px solid rgba(245,200,0,0.12);color:#6B7494;">
      <span>WRO Philippines Integrated Database System v2.0</span>
      <span style="color:#3d4a6a;">© 2025 FELTA Multimedia · WRO Philippines</span>
    </footer>
  </div>

  <!-- Mobile Overlay -->
  <!-- Note: onclick is handled by SidebarManager.init() after DOM ready -->
  <div id="mobile-overlay"
    class="hidden fixed inset-0 z-30 md:hidden"
    aria-hidden="true"
    role="presentation">
  </div>

  <!-- ── AI Chatbot Chathead + Modal ──────────────────────────── -->

  <!-- Floating Chathead Wrapper -->
  <div id="chat-head-wrapper" class="chat-head-wrapper">
    <div class="chat-head-tooltip">Ask Felix! ✨</div>
    <button id="chat-head-btn" class="chat-head-btn" onclick="ChatBot.open()" title="Chat with Felix – WRO Assistant" aria-label="Open AI Chat Assistant">
      <span class="chat-head-icon">
        <img src="assets/image/felix-profile.png" alt="Felix Profile">
      </span>
      <span class="chat-head-ping"></span>
    </button>
  </div>

  <!-- Chat Modal -->
  <div id="chat-modal" class="chat-modal" aria-hidden="true" role="dialog" aria-label="Felix AI Assistant">

    <!-- Header -->
    <div class="chat-modal-header">
      <div class="chat-modal-header-info">
        <div class="chat-avatar-sm" style="overflow: hidden;">
          <img src="assets/image/felix-profile.png" alt="Felix Profile" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div>
          <div class="chat-modal-title">Felix</div>
          <div class="chat-modal-status">
            <span class="chat-status-dot"></span>
            Online — WRO Philippines AI
          </div>
        </div>
      </div>
      <button class="chat-close-btn" onclick="ChatBot.close()" title="Minimize" aria-label="Close chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="chat-messages">
      <div class="chat-bubble chat-bubble-ai">
        <span>Hi! I'm <strong>Felix</strong>, your WRO Philippines database assistant. Ask me about competitions, teams, schools, payments, or anything in the database!</span>
      </div>
    </div>

    <!-- Model Agent Selector Panel -->
    <div class="chat-model-selector-wrap px-3.5 py-2">
      <div class="chat-model-selector-inner">
        <svg class="w-4 h-4 chat-model-selector-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.982-5.613a2.25 2.25 0 00.91-1.802V15M3 16.5V10.5A2.25 2.25 0 015.25 8.25h13.5A2.25 2.25 0 0121 10.5v6M3 10.5h18" />
        </svg>
        <select id="model-agent-selector" class="chat-model-selector">
          <option value="gemini-3.5-flash" selected>Felix Instantly 3.5 (Default)</option>
          <option value="gemini-3.1-pro-preview">Felix Overthinking 3.1 (Deep Reasoning)</option>
          <option value="gemini-2.5-flash">Felix Billable Hours 2.5 (Production Tier)</option>
          <option value="gemini-2.5-flash-lite">Felix On A Budget 2.5 (Cost-Saver Mode)</option>
        </select>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <input
        type="text"
        id="chat-input"
        class="chat-input"
        placeholder="Ask Felix anything about WRO Database…"
        autocomplete="off"
        aria-label="Chat message input"
      >
      <button id="chat-send-btn" class="chat-send-btn" aria-label="Send message">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</body>
</html>
