<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WRO Philippines – Standard User Portal</title>
  <meta name="description" content="WRO Philippines Standard User Portal – Access your school and team information.">

  <!-- Tailwind CSS (static build) -->
  <link rel="stylesheet" href="assets/css/output.css">

  <!-- Early theme init -->
  <script>
    (function() {
      const saved = localStorage.getItem('wro_ph_theme');
      const isLight = saved !== 'dark';
      if (isLight) document.documentElement.classList.add('light-mode');
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.js-theme-logo').forEach(img => {
          img.src = isLight ? 'assets/image/FELTA_LOGO_LIGHT.png' : 'assets/image/FELTA_LOGO_DARK.png';
        });
      });
    })();
  </script>

  <link rel="stylesheet" href="css/custom.css">
  <script src="js/core/db.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/portal/portal-auth.js"></script>

  <style>
    /* ── Input icon wrapper ── */
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; display: flex; align-items: center;
    }

    /* ── Login page body ── */
    body.login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
      position: relative;
    }

    /* ── Dark mode background (blue-accented) ── */
    body.login-page {
      background:
        radial-gradient(ellipse at 8% 45%, rgba(29,111,164,0.18) 0%, transparent 52%),
        radial-gradient(ellipse at 92% 12%, rgba(20,32,87,0.95) 0%, transparent 55%),
        radial-gradient(ellipse at 55% 92%, rgba(246,201,69,0.08) 0%, transparent 50%),
        #070c20;
    }

    /* ── Light mode background ── */
    html.light-mode body.login-page {
      background:
        radial-gradient(ellipse at 8% 45%, rgba(29,111,164,0.10) 0%, transparent 52%),
        radial-gradient(ellipse at 92% 12%, rgba(29,111,164,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 55% 92%, rgba(29,111,164,0.06) 0%, transparent 50%),
        linear-gradient(155deg, #EAF2FC 0%, #F5F9FF 45%, #E4EEF8 100%);
    }

    /* ── Animated background orbs ── */
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 10s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .login-orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(29,111,164,0.20), transparent 70%);
      top: -160px; left: -160px;
      animation-delay: 0s;
    }
    .login-orb-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(246,201,69,0.10), transparent 70%);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    .login-orb-3 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(30,158,191,0.10), transparent 70%);
      top: 40%; left: 65%;
      animation-delay: -7s;
    }
    html.light-mode .login-orb-1 { background: radial-gradient(circle, rgba(29,111,164,0.14), transparent 70%); }
    html.light-mode .login-orb-2 { background: radial-gradient(circle, rgba(29,111,164,0.09), transparent 70%); }
    html.light-mode .login-orb-3 { background: radial-gradient(circle, rgba(30,158,191,0.09), transparent 70%); }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      33% { transform: translateY(-24px) scale(1.04); }
      66% { transform: translateY(12px) scale(0.97); }
    }

    /* ── Dot grid overlay ── */
    .dot-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(rgba(29,111,164,0.65) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.020;
    }
    html.light-mode .dot-grid { opacity: 0.012; }

    /* ── Login card container ── */
    .login-card-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 10;
      animation: cardEntrance 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(44px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── The card itself ── */
    .login-card {
      background: rgba(11, 18, 50, 0.84);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(29,111,164,0.28);
      border-radius: 20px;
      padding: 2.2rem 2rem;
      box-shadow:
        0 0 0 1px rgba(29,111,164,0.08),
        0 8px 48px rgba(0,0,0,0.60),
        0 0 80px rgba(29,111,164,0.10);
    }
    html.light-mode .login-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(29,111,164,0.16);
      box-shadow:
        0 0 0 1px rgba(29,111,164,0.06),
        0 10px 48px rgba(10,20,60,0.11),
        0 2px 12px rgba(29,111,164,0.06);
    }

    /* ── Portal badge ── */
    .portal-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(29,111,164,0.16);
      border: 1px solid rgba(29,111,164,0.32);
      color: #4aadde;
      padding: 0.28rem 0.85rem;
      border-radius: 999px;
      font-size: 0.70rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    html.light-mode .portal-badge {
      background: rgba(29,111,164,0.10);
      border-color: rgba(29,111,164,0.24);
      color: #1555a0;
    }

    /* ── Status pill ── */
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .status-pill { background: rgba(20,30,70,0.60); border: 1px solid rgba(29,111,164,0.20); color: #4aadde; }
    html.light-mode .status-pill { background: rgba(29,111,164,0.07); border: 1px solid rgba(29,111,164,0.18); color: #1555a0; }

    /* ── Pulse dot (blue) ── */
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4aadde;
      box-shadow: 0 0 0 0 rgba(29,111,164,0.5);
      animation: dotPulseBlue 2.2s ease-in-out infinite;
    }
    html.light-mode .status-dot { background: #1555a0; }
    @keyframes dotPulseBlue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(29,111,164,0.5); }
      50%       { box-shadow: 0 0 0 7px rgba(29,111,164,0); }
    }

    /* ── Divider ── */
    .form-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(29,111,164,0.25), transparent);
      margin: 1.5rem 0;
    }
    html.light-mode .form-divider {
      background: linear-gradient(90deg, transparent, rgba(29,111,164,0.18), transparent);
    }

    /* ── Form inputs ── */
    .login-input {
      background: rgba(5, 9, 28, 0.85);
      border: 1px solid rgba(29,111,164,0.20);
      color: #EEF0F8;
      border-radius: 12px;
      padding: 11px 14px 11px 40px;
      width: 100%;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-input:focus {
      outline: none;
      border-color: #4aadde;
      box-shadow: 0 0 0 3px rgba(29,111,164,0.18);
    }
    .login-input::placeholder { color: rgba(107,116,148,0.7); }
    html.light-mode .login-input {
      background: #ffffff;
      border: 1px solid rgba(29,111,164,0.20);
      color: #0D1B3E;
      box-shadow: inset 0 1px 3px rgba(10,20,60,0.04);
    }
    html.light-mode .login-input:focus {
      border-color: #1d6fa4;
      box-shadow: 0 0 0 3px rgba(29,111,164,0.14);
    }
    html.light-mode .login-input::placeholder { color: #9EB3CE; }

    /* ── Label ── */
    .login-label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: rgba(107,116,148,0.9);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    html.light-mode .login-label { color: #5A6E96; }

    /* ── Input icon ── */
    .input-icon { color: rgba(107,116,148,0.7); }
    html.light-mode .input-icon { color: #9EB3CE; }

    /* ── Eye toggle button ── */
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(107,116,148,0.7);
      display: flex; align-items: center;
      transition: color 0.18s;
    }
    .eye-btn:hover { color: #4aadde; }
    html.light-mode .eye-btn { color: #9EB3CE; }
    html.light-mode .eye-btn:hover { color: #1555a0; }

    /* ── Submit button (blue) ── */
    .portal-submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, #2581bd 0%, #1555a0 100%);
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(29,111,164,0.40), 0 1px 4px rgba(0,0,0,0.25);
      transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 1.4rem;
    }
    .portal-submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(29,111,164,0.60), 0 2px 8px rgba(0,0,0,0.25);
      background: linear-gradient(135deg, #2e90cf 0%, #1d6fa4 100%);
    }
    .portal-submit-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .portal-submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Error box ── */
    .login-error {
      margin-top: 0.9rem;
      color: #E8384F;
      background: rgba(232,56,79,0.10);
      border: 1px solid rgba(232,56,79,0.24);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    html.light-mode .login-error {
      background: rgba(232,56,79,0.07);
      border-color: rgba(232,56,79,0.20);
    }

    /* ── Footer text ── */
    .login-footer { margin-top: 1.2rem; text-align: center; }
    .login-footer p { font-size: 12px; color: rgba(107,116,148,0.8); margin-bottom: 4px; }
    html.light-mode .login-footer p { color: #7A90B4; }
    .login-footer a { color: #4aadde; font-weight: 700; text-decoration: none; transition: opacity 0.18s; }
    .login-footer a:hover { opacity: 0.75; }
    html.light-mode .login-footer a { color: #1555a0; }
    .copyright-text { font-size: 11px; color: rgba(107,116,148,0.5) !important; margin-top: 2px; }
    html.light-mode .copyright-text { color: #A3B5CE !important; }

    /* ── Page title text ── */
    .login-title { color: #EEF0F8; font-size: 1.25rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; }
    html.light-mode .login-title { color: #0D1B3E; }
    .login-subtitle { color: rgba(107,116,148,0.85); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
    html.light-mode .login-subtitle { color: #7A90B4; }
  </style>
</head>

<body class="login-page">

  <!-- Background layers -->
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>
  <div class="dot-grid"></div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Login card -->
  <div class="login-card-wrap">
    <div class="login-card">

      <!-- Header: Logo + branding -->
      <div style="text-align:center; margin-bottom:1.6rem;">
        <div style="display:flex; justify-content:center; margin-bottom:1.1rem;">
          <img src="assets/image/FELTA_LOGO_DARK.png" alt="FELTA WRO Philippines"
               class="js-theme-logo"
               style="height:88px; width:auto; object-fit:contain; max-width:100%;
                      filter:drop-shadow(0 2px 14px rgba(29,111,164,0.30));">
        </div>

        <!-- WRO Rainbow bar -->
        <div class="wro-rainbow-bar rounded-full" style="margin-bottom:1.1rem;"></div>

        <!-- Portal badge + title -->
        <div style="margin-bottom:0.85rem;">
          <span class="portal-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Standard User Portal
          </span>
        </div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">WRO Philippines · Participant Access</p>

        <!-- Status pill -->
        <div style="margin-top:1rem;">
          <span class="status-pill">
            <span class="status-dot"></span>
            System Online
          </span>
        </div>
      </div>

      <!-- Divider -->
      <div class="form-divider"></div>

      <!-- Login Form -->
      <form id="portal-login-form" onsubmit="handlePortalLogin(event)" autocomplete="on" novalidate>

        <!-- Username -->
        <div style="margin-bottom:1rem;">
          <label class="login-label" for="portal-username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="portal-username" type="text" class="login-input"
              placeholder="Enter your username" autocomplete="username" required>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="login-label" for="portal-password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="portal-password" type="password" class="login-input"
              style="padding-right:44px;"
              placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" onclick="togglePortalPwd()" class="eye-btn" aria-label="Toggle password visibility">
              <span id="portal-pwd-eye">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </button>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" id="portal-login-btn" class="portal-submit-btn">
          <span id="portal-login-icon" style="display:flex;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </span>
          <span id="portal-login-text">Sign In to Portal</span>
        </button>

        <!-- Error message -->
        <div id="portal-login-error" class="login-error"></div>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>
        Are you an administrator?
        <a href="index.html">Go to Admin Portal →</a>
      </p>
      <p class="copyright-text">FELTA Multimedia · WRO Philippines © 2025 · Standard User Portal</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (PORTAL_AUTH.isLoggedIn()) { window.location.href = 'portal.html'; }
    });

    async function handlePortalLogin(e) {
      e.preventDefault();
      const username = document.getElementById('portal-username').value.trim();
      const password = document.getElementById('portal-password').value;
      const btn      = document.getElementById('portal-login-btn');
      const errEl    = document.getElementById('portal-login-error');

      btn.disabled = true;
      document.getElementById('portal-login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg>`;
      document.getElementById('portal-login-text').textContent = 'Signing in…';
      errEl.style.display = 'none';

      const result = await PORTAL_AUTH.login(username, password);
      if (result.success) {
        document.getElementById('portal-login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>`;
        document.getElementById('portal-login-text').textContent = 'Welcome!';
        setTimeout(() => { window.location.href = 'portal.html'; }, 600);
      } else {
        errEl.textContent = result.error;
        errEl.style.display = 'block';
        btn.disabled = false;
        document.getElementById('portal-login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4'/><polyline points='10 17 15 12 10 7'/><line x1='15' y1='12' x2='3' y2='12'/></svg>`;
        document.getElementById('portal-login-text').textContent = 'Sign In to Portal';
      }
    }

    function togglePortalPwd() {
      const pwd  = document.getElementById('portal-password');
      const eye  = document.getElementById('portal-pwd-eye');
      const open   = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg>`;
      const closed = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24'/><line x1='1' y1='1' x2='23' y2='23'/></svg>`;
      if (pwd.type === 'password') { pwd.type = 'text';     eye.innerHTML = closed; }
      else                         { pwd.type = 'password'; eye.innerHTML = open;   }
    }
  </script>

</body>
</html>
