<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WRO Philippines – Standard User Portal Login</title>
  <meta name="description" content="WRO Philippines Standard User Portal – Access your school and team information.">

  <!-- Tailwind CSS (static build) -->
  <link rel="stylesheet" href="assets/css/output.css">


  <!-- Early theme -->
  <script>
    (function() {
      const saved = localStorage.getItem('wro_ph_theme');
      const isLight = saved !== 'dark';
      if (isLight) document.documentElement.classList.add('light-mode');
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.js-theme-logo').forEach(img => {
          img.src = isLight ? 'assets/image/FELTA_LOGO_LIGHT.png' : 'assets/image/FELTA_LOGO_DARK.png';
        });
      });
    })();
  </script>

  <link rel="stylesheet" href="css/custom.css">
  <script src="js/core/db.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/portal/portal-auth.js"></script>

  <style>
    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; display: flex; align-items: center;
    }
    .portal-login-accent {
      background: linear-gradient(135deg, rgba(29,111,164,0.15), rgba(246,201,69,0.08));
      border: 1px solid rgba(29,111,164,0.25);
    }
    .portal-badge-label {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(29,111,164,0.15); border: 1px solid rgba(29,111,164,0.3);
      color: #1d6fa4; padding: 0.3rem 0.8rem; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }
    html.light-mode .portal-badge-label { color: #1555a0; }
  </style>
</head>

<body class="login-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Background orbs -->
  <div class="orb orb-1" style="background:radial-gradient(circle,rgba(29,111,164,0.35),transparent 70%);"></div>
  <div class="orb orb-2" style="background:radial-gradient(circle,rgba(246,201,69,0.20),transparent 70%);"></div>
  <div class="orb orb-3"></div>

  <!-- Dot grid -->
  <div class="fixed inset-0 pointer-events-none"
       style="background-image:radial-gradient(rgba(29,111,164,0.4) 1px,transparent 1px);background-size:34px 34px;opacity:0.018;">
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Login Card -->
  <div class="login-card w-full max-w-md relative z-10">
    <div class="glass rounded-2xl p-8 mb-4 portal-login-accent">

      <!-- Logo -->
      <div class="text-center mb-7">
        <div class="flex justify-center mb-5 w-full">
          <img src="assets/image/FELTA_LOGO_LIGHT.png" alt="FELTA WRO Philippines"
               class="h-24 md:h-28 w-auto object-contain js-theme-logo"
               style="max-width:100%;filter:drop-shadow(0 2px 16px rgba(29,111,164,0.35));">
        </div>

        <!-- Rainbow bar -->
        <div class="wro-rainbow-bar rounded-full mb-5"></div>

        <div class="space-y-2">
          <div class="flex justify-center">
            <span class="portal-badge-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Standard User Portal
            </span>
          </div>
          <h1 class="text-xl md:text-2xl font-black tracking-tight mt-3" style="color:var(--txt-primary);">
            Welcome Back
          </h1>
          <p class="text-xs font-semibold tracking-widest" style="color:var(--txt-muted);">
            WRO PHILIPPINES · PARTICIPANT ACCESS
          </p>
        </div>

        <!-- Live status -->
        <div class="flex items-center justify-center gap-2 mt-5 px-4 py-2 rounded-xl inline-flex glass-light" style="display:inline-flex;">
          <div class="pulse-dot"></div>
          <span class="text-xs font-bold uppercase tracking-wider" style="color:#1d6fa4;">System Online</span>
        </div>
      </div>

      <!-- Form -->
      <form id="portal-login-form" onsubmit="handlePortalLogin(event)" class="space-y-4" autocomplete="on" novalidate>

        <!-- Username -->
        <div>
          <label class="form-label text-xs uppercase tracking-wider font-bold mb-1.5 block text-left" for="portal-username">Username</label>
          <div class="input-wrap">
            <span class="input-icon" style="color:var(--txt-muted);">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input id="portal-username" type="text" class="form-input w-full rounded-xl py-3 text-sm font-medium transition-all" style="padding-left:40px;"
              placeholder="Enter your username" autocomplete="username" required>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="form-label text-xs uppercase tracking-wider font-bold mb-1.5 block text-left mt-4" for="portal-password">Password</label>
          <div class="input-wrap">
            <span class="input-icon" style="color:var(--txt-muted);">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input id="portal-password" type="password" class="form-input w-full rounded-xl py-3 text-sm font-medium transition-all" style="padding-left:40px;padding-right:44px;"
              placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" onclick="togglePortalPwd()"
              class="absolute right-3 top-1/2 -translate-y-1/2 transition-colors hover:opacity-80"
              style="color:var(--txt-muted);background:none;border:none;cursor:pointer;display:flex;align-items:center;">
              <span id="portal-pwd-eye" style="display:flex;align-items:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="portal-login-btn"
          class="btn-primary w-full py-3.5 rounded-xl font-black text-sm uppercase tracking-wide flex items-center justify-center gap-2 mt-6 transition-all"
          style="background:linear-gradient(135deg,#1d6fa4,#1555a0);">
          <span id="portal-login-icon" style="display:flex;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </span>
          <span id="portal-login-text">Sign In to Portal</span>
        </button>

        <!-- Error -->
        <div id="portal-login-error" class="hidden text-center text-sm p-3 rounded-xl"
          style="color:#E8384F;background:rgba(232,56,79,0.10);border:1px solid rgba(232,56,79,0.24);">
        </div>
      </form>
    </div>

    <!-- Admin Portal link -->
    <div class="text-center space-y-2">
      <p class="text-xs" style="color:var(--txt-muted);">
        Are you an administrator?
        <a href="index.html" class="font-semibold transition-colors hover:opacity-80" style="color:var(--felta-yellow);">
          Go to Admin Portal →
        </a>
      </p>
      <p class="text-center text-xs" style="color:#2d3a52;">
        FELTA Multimedia · WRO Philippines © 2025 · Standard User Portal
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in as portal user, redirect to portal
      if (PORTAL_AUTH.isLoggedIn()) { window.location.href = 'portal.html'; }
    });

    async function handlePortalLogin(e) {
      e.preventDefault();
      const username = document.getElementById('portal-username').value.trim();
      const password = document.getElementById('portal-password').value;
      const btn      = document.getElementById('portal-login-btn');
      const errEl    = document.getElementById('portal-login-error');

      btn.disabled = true;
      document.getElementById('portal-login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg>`;
      document.getElementById('portal-login-text').textContent = 'Signing in…';
      errEl.classList.add('hidden');

      const result = await PORTAL_AUTH.login(username, password);
      if (result.success) {
        document.getElementById('portal-login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>`;
        document.getElementById('portal-login-text').textContent = 'Welcome!';
        setTimeout(() => { window.location.href = 'portal.html'; }, 600);
      } else {
        errEl.textContent = result.error;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        document.getElementById('portal-login-icon').innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4'/><polyline points='10 17 15 12 10 7'/><line x1='15' y1='12' x2='3' y2='12'/></svg>`;
        document.getElementById('portal-login-text').textContent = 'Sign In to Portal';
      }
    }

    function togglePortalPwd() {
      const pwd  = document.getElementById('portal-password');
      const eye  = document.getElementById('portal-pwd-eye');
      const open = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg>`;
      const closed = `<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24'/><line x1='1' y1='1' x2='23' y2='23'/></svg>`;
      if (pwd.type === 'password') { pwd.type = 'text';     eye.innerHTML = closed; }
      else                         { pwd.type = 'password'; eye.innerHTML = open;   }
    }
  </script>
</body>
</html>
